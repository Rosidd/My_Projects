<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency_Exchanger</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .heading{
            font-size: 14px;
            text-align: center;
            color: #555;
            margin-bottom: 20px;
        }
        .rate {
            font-size: 40px;
            text-align: center;
            color: #333;
            margin: 10px 0;
            font-weight: bold;
        }
        .inputs {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;

        }

        input, select {
            width: 48%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .error{
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="heading">Currency Exchanger</div>
    <div class="rate" id="exchangeRate">Loading...</div>
    <div class="inputs">
        <select id="fromCurrency">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="JPY">JPY</option>
        </select>
        <select id="toCurrency">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="JPY">JPY</option>
        </select>
    </div>
    <div class="error" id="error"></div>
<script>
    const API_base= "http://127.0.0.1:8000/api/exchange_rate?from={from_currency}&to={to_currency}"
    
    const exchangeRateElement = document.getElementById('exchangeRate');
    const fromCurrencySelect = document.getElementById('fromCurrency');
    const toCurrencySelect = document.getElementById('toCurrency');
    const errorElement = document.getElementById('error');
    async function fetchExchangeRate() {
        const fromCurrency = fromCurrencySelect.value;
        const toCurrency = toCurrencySelect.value;

        try {
            const response = await fetch(`https://api.exchangerate-api.com/v4/latest/${fromCurrency}`);
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            const data = await response.json();
            const rate = data.rates[toCurrency];
            if (rate) {
                exchangeRateElement.textContent = `1 ${fromCurrency} = ${rate.toFixed(4)} ${toCurrency}`;
                errorElement.textContent = '';
            } else {
                throw new Error('Exchange rate not found');
            }
        } catch (error) {
            exchangeRateElement.textContent = 'Error fetching exchange rate';
            errorElement.textContent = error.message;
        }
    }
    fromCurrencySelect.addEventListener('change', fetchExchangeRate);
    toCurrencySelect.addEventListener('change', fetchExchangeRate);
    // Fetch initial exchange rate
    fetchExchangeRate();
</script>
</body>
</html>
